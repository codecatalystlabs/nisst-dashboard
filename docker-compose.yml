version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pwaiswa
      POSTGRES_DB: nisst
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      - postgres
    ports:
      - "8082:8082"

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./.env
    depends_on:
      - backend
    ports:
      - "4000:4000"

volumes:
  postgres_data:
